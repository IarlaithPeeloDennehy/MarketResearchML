<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded-square background matching --bg:#0F1115 -->
  <rect width="32" height="32" rx="6" fill="#0F1115"/>
  <!-- Subtle lime border accent -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#84CC16" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- N letterform in --primary:#84CC16 -->
  <!-- Left vertical bar -->
  <rect x="5" y="6" width="5" height="20" fill="#84CC16"/>
  <!-- Diagonal stroke (parallelogram connecting bars) -->
  <polygon points="10,6 15,6 22,26 17,26" fill="#84CC16"/>
  <!-- Right vertical bar -->
  <rect x="22" y="6" width="5" height="20" fill="#84CC16"/>
</svg>
